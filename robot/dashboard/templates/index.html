<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Agent Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f1a;
    --panel: #141728;
    --border: #2a2f4a;
    --accent: #6c63ff;
    --green: #00e676;
    --cyan: #00e5ff;
    --yellow: #ffd740;
    --pink: #f06292;
    --red: #ff5252;
    --text: #e0e0e0;
    --dim: #7a7f9a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 24px;
  }
  header .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 1.8s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.04em; }
  header span { color: var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: auto 1fr;
    gap: 16px;
    height: calc(100vh - 100px);
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
  }
  .panel h2 {
    font-size: 0.72rem; font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  /* Status Panel */
  .status-grid { display: flex; flex-direction: column; gap: 10px; }
  .stat-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px;
    background: #1a1e31;
    border-radius: 8px;
  }
  .stat-row .label { font-size: 0.82rem; color: var(--dim); }
  .stat-row .value {
    font-size: 0.85rem; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
  }
  .badge-green { background: rgba(0,230,118,.15); color: var(--green); }
  .badge-cyan  { background: rgba(0,229,255,.15); color: var(--cyan); }
  .badge-yellow { background: rgba(255,215,64,.15); color: var(--yellow); }
  .badge-red   { background: rgba(255,82,82,.15);  color: var(--red); }
  .badge-dim   { background: rgba(122,127,154,.15); color: var(--dim); }

  /* People Panel */
  #people-list { display: flex; flex-direction: column; gap: 8px; }
  .person-tag {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px;
    background: #1a1e31;
    border-radius: 8px;
    font-size: 0.84rem;
  }
  .person-tag .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.9rem;
    background: var(--accent); color: #fff;
    flex-shrink: 0;
  }

  /* Objects Panel */
  #objects-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    padding: 5px 12px; border-radius: 20px;
    font-size: 0.78rem; font-weight: 500;
    background: rgba(108,99,255,.15); color: var(--accent);
    border: 1px solid rgba(108,99,255,.3);
  }

  /* Thought Panel */
  .thought-box {
    padding: 12px;
    background: rgba(240, 98, 146, 0.1);
    border-left: 3px solid var(--pink);
    border-radius: 0 8px 8px 0;
    font-size: 0.85rem;
    color: #e0e0e0;
    font-style: italic;
    min-height: 40px;
    white-space: pre-wrap;
  }

  /* Log Panel */
  .log-panel {
    grid-column: 1 / -1;
    display: flex; flex-direction: column;
    height: 250px; /* Fixed height instead of max-height to ensure flex children size correctly */
  }
  #log-container {
    flex: 1; overflow-y: auto;
    padding: 6px 0;
    display: flex; flex-direction: column; gap: 4px;
  }
  #log-container::-webkit-scrollbar { width: 5px; }
  #log-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .log-entry {
    font-size: 0.8rem; font-family: 'Inter', monospace;
    padding: 6px 10px; border-radius: 6px;
    background: #1a1e31;
    border-left: 3px solid transparent;
    line-height: 1.4;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; } }
  .log-entry.agent   { border-color: var(--yellow); color: var(--yellow); }
  .log-entry.user    { border-color: var(--cyan); color: var(--cyan); }
  .log-entry.thought { border-color: var(--pink); color: var(--pink); }
  .log-entry.action  { border-color: #00e5ff; color: #00e5ff; }
  .log-entry.memory  { border-color: var(--green); color: var(--green); }
  .log-entry.saved   { border-color: #b388ff; color: #b388ff; background: rgba(179,136,255,0.1); }
  .log-entry.warn    { border-color: var(--red); color: var(--red); }
  .log-entry.default { color: var(--text); }
  
  .header-uptime {
    font-size: 0.8rem;
    color: var(--dim);
    margin-left: auto;
    padding: 4px 10px;
    background: #1a1e31;
    border-radius: 20px;
  }
</style>
</head>
<body>
<header>
  <div class="dot"></div>
  <h1>Robot <span>Agent</span> Dashboard</h1>
  <div class="header-uptime" id="uptime">Uptime: 00:00:00</div>
</header>

<div class="grid">
  <!-- Left Sidebar -->
  <div style="display:flex; flex-direction:column; gap:16px; overflow-y: auto; max-height: calc(100vh - 100px);">

    <!-- Camera Preview -->
    <div class="panel" style="padding: 10px;">
      <h2 style="margin-bottom: 8px; border-bottom: none; padding-bottom: 0;">Live View</h2>
      <img src="/video_feed" style="width: 100%; border-radius: 8px; border: 1px solid var(--border); display: block;" onerror="this.onerror=null; this.src=''; this.alt='Camera feed unavailable'; this.style.padding='20px';" />
    </div>

    <!-- System Status -->
    <div class="panel">
      <h2>System Status</h2>
      <div class="status-grid">
        <div class="stat-row">
          <span class="label">📷 Camera FPS</span>
          <span class="value badge-green" id="fps">–</span>
        </div>
        <div class="stat-row">
          <span class="label">🎙️ Microphone</span>
          <span class="value badge-cyan" id="stt">Idle</span>
        </div>
        <div class="stat-row">
          <span class="label">🧠 LLM</span>
          <span class="value badge-dim" id="llm">Idle</span>
        </div>
      </div>
    </div>

    <!-- Current Thought -->
    <div class="panel">
      <h2>Brain: Internal Thought 🧠</h2>
      <div id="thought-box" class="thought-box">Waiting for thoughts...</div>
    </div>

    <!-- People -->
    <div class="panel">
      <h2>People in Frame</h2>
      <div id="people-list"><p style="color:var(--dim); font-size:0.82rem;">No one detected.</p></div>
    </div>

    <!-- Detected Objects -->
    <div class="panel">
      <h2>Detected Objects</h2>
      <div id="objects-chips"><p style="color:var(--dim); font-size:0.82rem;">–</p></div>
    </div>
  </div>

  <!-- Log Panel -->
  <div class="panel log-panel">
    <h2>Event Log <span style="float:right; cursor:pointer; color:var(--accent);" onclick="clearLog()">Clear</span></h2>
    <div id="log-container"></div>
  </div>
</div>

<script>
const logEl = document.getElementById("log-container");
const maxLogs = 300;

function formatUptime(seconds) {
  const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
  const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
  const s = (seconds % 60).toString().padStart(2, '0');
  return `${h}:${m}:${s}`;
}

function classify(text) {
  if (text.includes("Saved to Memory:") || text.includes("📝 Saved")) return "saved";
  if (text.includes("Agent:")) return "agent";
  if (text.includes("Heard:") || text.includes("User:")) return "user";
  if (text.includes("Thought:") || text.includes("🧠")) return "thought";
  if (text.includes("Action:") || text.includes("⚙️")) return "action";
  if (text.includes("Saved") || text.includes("Known:") || text.includes("📌") || text.includes("💾")) return "memory";
  if (text.includes("Warning") || text.includes("⚠️")) return "warn";
  return "default";
}

function addLog(text) {
  const el = document.createElement("div");
  el.className = `log-entry ${classify(text)}`;
  el.textContent = text;
  logEl.appendChild(el);
  while (logEl.children.length > maxLogs) logEl.removeChild(logEl.firstChild);
  logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() { logEl.innerHTML = ""; }

// Fetch full log history on load
fetch("/log").then(r => r.json()).then(logs => logs.forEach(addLog));

// Connect SSE
const es = new EventSource("/events");
es.onmessage = function(e) {
  const d = JSON.parse(e.data);

  // Update FPS & Uptime
  document.getElementById("fps").textContent = d.camera_fps + " fps";
  if (d.uptime !== undefined) {
      document.getElementById("uptime").textContent = "Uptime: " + formatUptime(d.uptime);
  }

  // Update STT
  const sttEl = document.getElementById("stt");
  sttEl.textContent = d.stt_status;
  sttEl.className = "value " + (d.stt_status.toLowerCase().includes("listen") ? "badge-green" : "badge-dim");

  // Update LLM
  const llmEl = document.getElementById("llm");
  llmEl.textContent = d.llm_status;
  llmEl.className = "value " + (d.llm_busy ? "badge-yellow" : "badge-dim");

  // Update Thought
  if (d.current_thought) {
      document.getElementById("thought-box").textContent = d.current_thought;
  }

  // Update people
  const pl = document.getElementById("people-list");
  const people = Object.entries(d.known_people);
  if (people.length === 0) {
    pl.innerHTML = '<p style="color:var(--dim); font-size:0.82rem;">No one detected.</p>';
  } else {
    pl.innerHTML = people.map(([tid, personData]) => {
      let name = personData;
      let emotion = "";
      let memoryHtml = "";
      if (typeof personData === 'object' && personData !== null) {
          name = personData.name;
          emotion = personData.emotion ? `<span style="font-size: 0.75rem; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 10px; margin-left: 6px;">${personData.emotion}</span>` : "";
          
          if (personData.is_known_pid) {
              let details = [];
              if (personData.job) details.push(`💼 ${personData.job}`);
              if (personData.interests && personData.interests.length) details.push(`❤️ ${personData.interests.join(", ")}`);
              
              if (details.length > 0) {
                  memoryHtml = `<div style="font-size: 0.75rem; color: var(--green); margin-top: 4px; padding-top: 4px; border-top: 1px dashed rgba(255,255,255,0.1);">${details.join(" | ")}</div>`;
              } else {
                  memoryHtml = `<div style="font-size: 0.75rem; color: var(--dim); margin-top: 4px; padding-top: 4px; border-top: 1px dashed rgba(255,255,255,0.1);">No learned facts yet.</div>`;
              }
          }
      }
      
      return `
      <div class="person-tag" style="flex-direction: column; align-items: stretch; gap: 4px;">
        <div style="display: flex; align-items: center; gap: 10px;">
          <div class="avatar">${(name[0] || "?").toUpperCase()}</div>
          <div style="flex: 1;">
            <div style="font-weight:600; display: flex; align-items: center;">${name} ${emotion}</div>
            <div style="font-size:0.72rem; color:var(--dim)">Track #${tid}</div>
          </div>
        </div>
        ${memoryHtml}
      </div>
    `}).join("");
  }

  // Update objects
  const oc = document.getElementById("objects-chips");
  if (d.objects && d.objects.length > 0) {
    oc.innerHTML = d.objects.map(o => {
        // Map position to a colored dot or badge
        let badgeColor = "var(--dim)";
        if (o.position.includes("center")) badgeColor = "var(--yellow)";
        else if (o.position.includes("left")) badgeColor = "var(--cyan)";
        else if (o.position.includes("right")) badgeColor = "var(--pink)";
        
        return `<div class="chip">
            <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${badgeColor};margin-right:4px;"></span>
            ${o.label} <span style="opacity:.6;font-size:0.7rem;">${o.position}</span>
        </div>`;
    }).join("");
  } else {
    oc.innerHTML = '<p style="color:var(--dim); font-size:0.82rem;">–</p>';
  }

  // Add batched new log events
  if (d.new_events && d.new_events.length > 0) {
      d.new_events.forEach(addLog);
  }
};
</script>
</body>
</html>
